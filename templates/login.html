<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 视频派发系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Flash 消息 -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">
            <span>{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <!-- 登录页面 -->
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <div class="login-logo">🎬</div>
                <h1 class="login-title">视频派发系统</h1>
                <p class="login-subtitle">管理员 / 上传者登录</p>
            </div>
            
            <!-- 员工提示 -->
            <div class="info-box" style="margin-bottom: 24px; padding: 16px; background: rgba(59, 130, 246, 0.1); border-radius: 12px; text-align: center;">
                <p style="margin: 0; color: var(--text-secondary); font-size: 0.9rem;">
                    <span style="font-size: 1.2rem;">👋</span><br>
                    员工下载视频 <strong>无需登录</strong><br>
                    <a href="{{ url_for('download_page') }}" style="color: var(--primary-light);">直接点击这里下载 →</a>
                </p>
            </div>
            
            <form method="POST" action="{{ url_for('login') }}" class="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="请输入用户名"
                        required
                        autocomplete="username"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="请输入密码"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg">
                    <span>🚀</span>
                    登录
                </button>
            </form>
            
            <div class="text-center mt-3 text-muted">
                <small>忘记密码请联系管理员</small>
            </div>
            
            <div style="margin-top: 20px; text-align: center;">
                <a href="{{ url_for('download_page') }}" class="btn btn-secondary" style="text-decoration: none;">
                    <span>⬅️</span> 返回首页
                </a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
